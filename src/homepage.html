<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <title>Smart Notes</title>
</head>
<body class="home-page">

    <div class="container home-shell">
        <section class="home-hero">
            <div>
                <p class="home-hero__eyebrow">Workspace</p>
                <h1 class="home-hero__title">Smart Notes</h1>
                <p class="home-hero__text">
                    Keep your notes, tasks, and shared work in one focused dashboard.
                </p>
            </div>
        </section>

        <div class="row home-layout">
            <div class="col-lg-8 home-main">
                <section class="home-panel home-notes-panel">
                    <div class="searchHeader home-toolbar">
                        <div class="home-toolbar__title">
                            <h3 id="tableHeader">My Notes</h3>
                            <p>Search, sort, and manage your notes.</p>
                        </div>
                        <div class="home-toolbar__actions">
                            <button class="btn home-icon-btn" id="sharedNotesBtn" aria-label="Toggle shared notes">
                                <i class="fa-solid fa-user-group"></i>
                            </button>
                            <div class="home-search">
                                <i class="fa-solid fa-magnifying-glass"></i>
                                <input class="form-control" id="searchInput" type="search" placeholder="Search by title" aria-label="Search">
                            </div>
                        </div>
                    </div>

                    <div class="home-table-wrap">
                        <table class="table table-bordered table-striped table-dark" id="notesTable">
                            <thead>
                                <tr>
                                    <th style="width: 28%;"><i class="fa-solid fa-heading" style="color: #74C0FC;"></i> Title</th>
                                    <th style="width: 22%;" id="category"><i class="fa-solid fa-layer-group" style="color: #74C0FC;"></i> Category</th>
                                    <th style="width: 20%;"><i class="fa-solid fa-calendar-days" style="color: #74C0FC;"></i> Last Updated</th>
                                    <th class="text-center" style="width: 20%;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="note-list"></tbody>
                            <tbody id="hidden-note-list"></tbody>
                        </table>
                    </div>

                    <div class="home-notes-footer">
                        <button type="button" class="btn btn-success home-primary-btn" id="createNoteBtn">Create Note</button>
                        <div class="home-pagination">
                            <button type="button" class="btn btn-outline-secondary home-page-btn" id="previousPageBtn" aria-label="Previous page">
                                <i class="fa-solid fa-arrow-left"></i>
                            </button>
                            <span id="pageNumber" class="page-number">1</span>
                            <button type="button" class="btn btn-outline-secondary home-page-btn" id="nextPageBtn" aria-label="Next page">
                                <i class="fa-solid fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                </section>
            </div>

            <div class="col-lg-4 home-sidebar">
                <section class="cards home-panel home-actions-panel">
                    <div class="home-section-heading">
                        <h3>Quick Actions</h3>
                        <p>Shortcuts for the things you use most.</p>
                    </div>
                    <div class="home-quick-actions">
                        <button type="button" class="btn btn-outline-danger home-quick-action-btn" id="hiddenNotesBtn" aria-label="Hidden notes" title="Hidden Notes">
                            <i class="fa-solid fa-lock"></i>
                        </button>
                        <button type="button" class="btn btn-outline-info home-quick-action-btn" id="settingsBtn" aria-label="Settings" title="Settings">
                            <i class="fa-solid fa-gear"></i>
                        </button>
                        <button type="button" class="btn btn-outline-secondary home-quick-action-btn" id="logoutBtn" aria-label="Log out" title="Log Out">
                            <i class="fa-solid fa-door-open"></i>
                        </button>
                    </div>
                </section>

                <section class="todo home-panel home-todo-panel">
                    <div class="home-section-heading home-section-heading--inline">
                        <div>
                            <h3>To-Do</h3>
                            <p>Quick personal task tracking.</p>
                        </div>
                        <small class="text-muted">Up to 9 tasks</small>
                    </div>
                    <hr>
                    <div class="home-todo-list">
                        <table class="table" id="todoTable">
                            <tbody id="to-do-content"></tbody>
                        </table>
                    </div>
                    <div class="cards-button text-center mt-3">
                        <button type="button" class="btn btn-success home-add-todo-btn" id="addTodo">Add Task</button>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="noteModal" class="note-modal" style="display: none;">
        <div class="note-modal-content" id="noteModalContent">
            <button id="closeNoteModal" class="note-modal-close" type="button" aria-label="Close preview">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div id="noteContent"></div>
        </div>
    </div>

    <div id="welcomePopup" class="welcomePopup">
        <div id="welcomePopupContent" style="color: rgb(255, 255, 255);"></div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/app.js"></script>
    
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Smart Notes - Manage Categories</title>
</head>
<body class="utility-page">
    <main class="container utility-shell">
        <section class="utility-hero">
            <p class="utility-hero__eyebrow">Workspace Settings</p>
            <h1 class="utility-hero__title">Manage categories</h1>
            <p class="utility-hero__text">Keep your note categories tidy and easy to reuse.</p>
        </section>

        <section class="utility-panel utility-panel--narrow">
            <div class="utility-panel__header">
                <h3>Categories</h3>
                <p>Edit or remove the categories you use across notes.</p>
            </div>

            <div class="utility-inline-note">
                <i class="fa-solid fa-layer-group"></i>
                <span>Maximum 9 categories</span>
            </div>

            <div class="categoryCards utility-category-list"></div>

            <div class="utility-actions">
                <button type="button" class="btn btn-success utility-primary-btn" id="addCategory">
                    <i class="fa-solid fa-plus"></i>
                    Add Category
                </button>
                <button type="button" class="btn btn-outline-secondary utility-secondary-btn" id="gobackBtn">Go Back</button>
            </div>
        </section>
    </main>

    <script src="js/theme.js"></script>
    <script src="js/managecategories.js"></script>
</body>
</html>

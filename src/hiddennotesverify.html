<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <title>Smart Notes</title>
</head>
<body class="verify-page">

    <main class="verify-shell">
        <section class="verify-card">
            <div class="verify-card__header">
                <span class="verify-card__icon">
                    <i class="fa-solid fa-lock"></i>
                </span>
                <p class="verify-card__eyebrow">Private Access</p>
                <h1 class="verify-card__title">Unlock hidden notes</h1>
                <p class="verify-card__text">
                    Enter your hidden notes password to continue.
                </p>
            </div>

            <form id="form" class="verify-form" novalidate>
                <div class="form-group mb-3">
                    <label for="password" class="verify-label">Hidden Notes Password</label>
                    <input type="password" class="form-control verify-input" id="password" placeholder="Enter password">
                    <div></div>
                </div>

                <p id="verificationStatus" class="verify-status" aria-live="polite"></p>

                <div class="verify-actions">
                    <button type="submit" class="btn verify-submit-btn">Submit</button>
                    <button type="button" class="btn verify-secondary-btn" id="gobackBtn">Go Back</button>
                </div>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
    <script src="js/theme.js"></script>
    <script src="js/hiddennotesverify.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Smart Notes - Settings</title>
</head>
<body class="utility-page">
    <main class="container utility-shell">
        <section class="utility-hero">
            <p class="utility-hero__eyebrow">Workspace Settings</p>
            <h1 class="utility-hero__title">Settings</h1>
            <p class="utility-hero__text">Adjust a few essentials without leaving your workspace.</p>
        </section>

        <section class="utility-panel utility-panel--narrow">
            <div class="utility-panel__header">
                <h3>Preferences</h3>
                <p>Theme, categories, and data controls live here.</p>
            </div>

            <div class="utility-stack">
                <button type="button" class="btn btn-dark utility-primary-btn" id="themeToggle">Switch Theme</button>
                <button type="button" class="btn btn-outline-success utility-secondary-btn" id="manageCategoriesBtn">Manage Categories</button>
                <button type="button" class="btn btn-outline-secondary utility-secondary-btn" id="gobackBtn">Go Back</button>
            </div>

            <div class="utility-danger-zone">
                <p class="utility-danger-zone__label">Danger Zone</p>
                <button type="button" class="btn btn-danger utility-danger-btn" id="deleteDataBtn">Delete All Notes</button>
            </div>
        </section>
    </main>

    <script src="js/theme.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
